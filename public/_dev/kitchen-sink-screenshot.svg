<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Placeholder UI mockup with three labeled regions">
  <rect width="1600" height="900" fill="#1f2937"/>
  <rect x="0" y="0" width="1600" height="80" fill="#111827"/>
  <text x="40" y="50" font-family="Geist, system-ui, sans-serif" font-size="22" fill="#f9fafb" font-weight="600">Kitchen Sink Placeholder</text>
  <text x="40" y="74" font-family="Geist, system-ui, sans-serif" font-size="13" fill="#9ca3af">Synthetic mockup for hotspot demos. Not real product UI.</text>
  <rect x="80" y="160" width="420" height="240" rx="12" fill="#3b82f6" fill-opacity="0.18" stroke="#3b82f6" stroke-width="2"/>
  <text x="290" y="270" font-family="Geist, system-ui, sans-serif" font-size="18" fill="#bfdbfe" text-anchor="middle" font-weight="600">Primary action</text>
  <text x="290" y="298" font-family="Geist, system-ui, sans-serif" font-size="13" fill="#93c5fd" text-anchor="middle">Tone: primary</text>
  <rect x="590" y="160" width="420" height="240" rx="12" fill="#f59e0b" fill-opacity="0.18" stroke="#f59e0b" stroke-width="2"/>
  <text x="800" y="270" font-family="Geist, system-ui, sans-serif" font-size="18" fill="#fde68a" text-anchor="middle" font-weight="600">Warning region</text>
  <text x="800" y="298" font-family="Geist, system-ui, sans-serif" font-size="13" fill="#fcd34d" text-anchor="middle">Tone: warning</text>
  <rect x="1100" y="160" width="420" height="240" rx="12" fill="#10b981" fill-opacity="0.18" stroke="#10b981" stroke-width="2"/>
  <text x="1310" y="270" font-family="Geist, system-ui, sans-serif" font-size="18" fill="#a7f3d0" text-anchor="middle" font-weight="600">Success region</text>
  <text x="1310" y="298" font-family="Geist, system-ui, sans-serif" font-size="13" fill="#6ee7b7" text-anchor="middle">Tone: success</text>
  <rect x="80" y="480" width="1440" height="320" rx="12" fill="#374151" fill-opacity="0.5" stroke="#4b5563" stroke-width="1"/>
  <text x="800" y="650" font-family="Geist Mono, ui-monospace, monospace" font-size="14" fill="#9ca3af" text-anchor="middle">content area</text>
</svg>
